
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Calendar</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">LC</div>
        <div>
          <div class="brand-title">Local Calendar</div>
          <div class="brand-subtitle">Private desktop planner</div>
        </div>
      </div>

      <section class="sidebar-section">
        <div class="section-header">
          <span>Mini calendar</span>
          <button class="ghost-btn" id="miniTodayBtn">Today</button>
        </div>
        <div id="miniCalendar" class="mini-calendar"></div>
      </section>

      <section class="sidebar-section">
        <div class="section-header">
          <span>Calendars</span>
          <button class="icon-btn" id="addCalendarBtn" title="Add calendar">+</button>
        </div>
        <div id="calendarList" class="calendar-list"></div>
      </section>

      <section class="sidebar-section sidebar-footer">
        <div class="legend-item"><span class="dot accent"></span><span>Offline only</span></div>
        <div class="legend-item"><span class="dot soft"></span><span>SQLite saved</span></div>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="primary-btn" id="newEventBtn">+ New event</button>
        </div>

        <div class="topbar-center">
          <div class="nav-group">
            <button class="icon-btn" id="prevBtn" title="Previous">‹</button>
            <div class="date-display">
              <h1 id="pageTitle">Calendar</h1>
              <div id="pageSubtitle" class="page-subtitle"></div>
            </div>
            <button class="icon-btn" id="nextBtn" title="Next">›</button>
          </div>
        </div>

        <div class="topbar-right">
          <div class="view-tabs">
            <button class="tab-btn active" data-view="month">Month</button>
            <button class="tab-btn" data-view="week">Week</button>
          </div>
          
          <div class="divider"></div>

          <div class="toolbar-actions">
            <button class="pill-btn" id="todayBtn">Today</button>
            <div class="filter-wrap">
              <button class="pill-btn" id="filterBtn">
                <span>Filter</span>
                <span class="chevron">▾</span>
              </button>
              <div id="filterDropdown" class="dropdown hidden">
                <div class="dropdown-header">
                  <span>Show Calendars</span>
                  <button class="ghost-btn" id="addCalendarBtnTop" style="font-size:11px;padding:2px 6px;">+ Add</button>
                </div>
                <div id="filterCalendarList" class="filter-calendar-list"></div>
              </div>
            </div>
            <div class="search-wrap">
              <input id="searchInput" type="search" placeholder="Search events..." />
            </div>
          </div>
        </div>
        <input id="jumpDate" type="date" class="date-input hidden" />
      </header>

      <section class="content">
        <div id="calendarRoot" class="calendar-root"></div>
      </section>
    </main>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-card gc-modal">
      <div class="modal-header">
        <button class="icon-btn" id="closeModalBtn">×</button>
      </div>

      <form id="eventForm" class="event-form gc-form">
        <input type="hidden" id="eventId" />
        
        <div class="gc-row title-row">
          <input id="titleInput" type="text" required maxlength="120" placeholder="Add title" class="gc-title-input" />
        </div>

        <div class="gc-row type-row">
          <span class="gc-icon">🕒</span>
          <div class="gc-datetime-row">
            <div class="date-inputs">
              <input id="startDateInput" type="date" required class="gc-input" />
              <div id="timeRow" class="time-inputs">
                <input id="startTimeInput" type="time" class="gc-input" />
                <span>–</span>
                <input id="endTimeInput" type="time" class="gc-input" />
              </div>
              <input id="endDateInput" type="date" required class="gc-input" />
            </div>
            <label class="gc-checkbox-label">
              <input id="allDayInput" type="checkbox" />
              <span>All-day</span>
            </label>
          </div>
        </div>

        <div class="gc-row recurrence-row">
          <span class="gc-icon">🔄</span>
          <div class="recurrence-controls">
            <div class="recurrence-main">
              <select id="recurrenceType" class="gc-input">
                <option value="none">Does not repeat</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
              <div id="recurrenceDetail" class="recurrence-detail">
                <span>every</span>
                <input id="recurrenceInterval" type="number" min="1" step="1" value="1" class="gc-input small" />
                <span>unit(s) until</span>
                <input id="recurrenceUntil" type="date" class="gc-input" />
              </div>
            </div>
            <div id="weeklyDaysSelector" class="weekly-days hidden">
              <button type="button" class="day-circle" data-day="0">S</button>
              <button type="button" class="day-circle" data-day="1">M</button>
              <button type="button" class="day-circle" data-day="2">T</button>
              <button type="button" class="day-circle" data-day="3">W</button>
              <button type="button" class="day-circle" data-day="4">T</button>
              <button type="button" class="day-circle" data-day="5">F</button>
              <button type="button" class="day-circle" data-day="6">S</button>
            </div>
          </div>
        </div>

        <div class="gc-row location-row">
          <span class="gc-icon">📍</span>
          <input id="locationInput" type="text" maxlength="120" placeholder="Add location" class="gc-input full" />
        </div>

        <div class="gc-row description-row">
          <span class="gc-icon">📝</span>
          <textarea id="descriptionInput" rows="1" placeholder="Add description" class="gc-input full"></textarea>
        </div>

        <div class="gc-row calendar-row">
          <span class="gc-icon">📅</span>
          <select id="calendarSelect" class="gc-input full"></select>
        </div>

        <div class="gc-row reminder-row">
          <span class="gc-icon">🔔</span>
          <div class="reminder-controls">
            <label class="gc-checkbox-label">
              <input id="notifyInput" type="checkbox" checked />
              <span>Reminder</span>
            </label>
            <input id="reminderInput" type="number" min="0" step="5" value="10" class="gc-input small" />
            <span>minutes before</span>
          </div>
        </div>

        <div class="modal-actions gc-actions">
          <button type="button" id="deleteEventBtn" class="danger-btn hidden">Delete</button>
          <div class="spacer"></div>
          <button type="button" id="cancelBtn" class="secondary-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="timePickerOverlay" class="time-picker-overlay hidden">
    <div class="time-picker-card">
      <div class="time-picker-header">
        <div id="tpSelectedTime">
          <span id="tpSelectedHour" class="active">12</span>:<span id="tpSelectedMinute">00</span>
          <div class="tp-ampm-toggle">
            <span id="tpAM" class="active">AM</span>
            <span id="tpPM">PM</span>
          </div>
        </div>
      </div>
      <div class="clock-face-container">
        <div id="clockFace" class="clock-face">
          <div class="clock-center"></div>
          <div id="clockHand" class="clock-hand">
            <div class="hand-circle"></div>
          </div>
          <div id="clockNumbers" class="clock-numbers"></div>
        </div>
      </div>
      <div class="time-picker-actions">
        <button type="button" id="tpCancel" class="secondary-btn">Cancel</button>
        <button type="button" id="tpOK" class="primary-btn">OK</button>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
